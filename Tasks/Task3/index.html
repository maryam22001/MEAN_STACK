<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/all.css">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body class="bg-dark text-white">
    <main class="container">
      <section class="row my-5">
        <div class="col-lg-6">
          <label class="" for="productName">product name</label>
          <input class="form-control text-white bg-dark" id="productName" type="text">
        </div>
        <div class="col-lg-6">
          <label class="" for="productCategory">product category </label>
          <input class="form-control text-white bg-dark" id="productCategory" type="text">
        </div>
        <div class="col-lg-4">
          <label class="" for="productPrice">product price </label>
          <input onkeyup="getTotle()" class="form-control text-white bg-dark" id="productPrice" type="number">
        </div>
        <div class="col-lg-4">
          <label class="" for="productDiscount">product discount </label>
          <input onkeyup="getTotle()" class="form-control text-white bg-dark" id="productDiscount" type="number">
        </div>
        <div class="col-lg-4">
          <label class="" for="productQuantity">product quantity </label>
          <input class="form-control text-white bg-dark" id="productQuantity" type="number">
        </div>
        <div class="row justify-content-between align-items-center">
          <div class="mt-3 px-0 col-3">
            <button id="addProductBtn" class="btn btn-outline-success">add product</button>
            <button id="updataProductBtn" class="btn btn-outline-info d-none"> updata product</button>
          </div>
          <div class="col-1">
            <span id="total" class="border-1 border px-3 rounded-1"></span>
          </div>
        </div>
        <div class="col-6 mx-auto my-4">
          <div class="form-floating text-white">
            <input type="text" name="" id="searchInput" class="form-control text-white bg-dark" placeholder="">
            <label class="text-white" for="searchInput"> search</label>
          </div>
        </div>
      </section>
      <section class="row">
        <div class=" mx-auto table-responsive">
          <table class="table table-dark table-striped table-hover ">
            <thead>
              <tr>
                <th>id</th>
                <th>quantity</th>
                <th>name</th>
                <th>category</th>
                <th>price</th>
                <th>dicount</th>
                <th>total</th>
                <th>updata</th>
                <th>delete</th>
              </tr>


            </thead>


            <tbody id="showData">
            


                

            </tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="js/bootstrap.bundle.js"></script>
    <script src="js/script2.js"></script>
  

</body></html>
